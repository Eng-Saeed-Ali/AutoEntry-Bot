# =============================================================================
# AutoEntry Bot — Docker Compose orchestration
# =============================================================================
# Services:
#   postgres  — PostgreSQL 16 (persistent volume, healthcheck)
#   bot       — AutoEntry application (waits for healthy postgres)
# =============================================================================

version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — persistent data store with health monitoring
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: autoentry-postgres
    restart: unless-stopped

    env_file:
      - .env

    environment:
      # Explicitly map from typical .env keys to postgres image variables.
      POSTGRES_USER: ${POSTGRES_USER:-autoentry}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-autoentry}
      POSTGRES_DB: ${POSTGRES_DB:-autoentry}

    volumes:
      - pgdata:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-autoentry} -d ${POSTGRES_DB:-autoentry}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

    ports:
      - "5432:5432"

    networks:
      - autoentry-net

  # ---------------------------------------------------------------------------
  # Bot — AutoEntry application container
  # ---------------------------------------------------------------------------
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autoentry-bot
    restart: unless-stopped

    env_file:
      - .env

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - autoentry-net

# ---------------------------------------------------------------------------
# Persistent volumes
# ---------------------------------------------------------------------------
volumes:
  pgdata:
    driver: local

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  autoentry-net:
    driver: bridge